    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .simple-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .simple-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
        }
        .movie-card:hover img { transform: scale(1.05); filter: brightness(0.5); }
        .movie-card:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        iframe { background: #000; border: none; }
        
        /* Custom Scrollbar for Sidebar/Lists */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Toast Animation */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }

        /* Skeleton Loading Animation */
        .skeleton { animation: pulse 1.5s infinite ease-in-out; background: #1a1a1a; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

            const grid = document.getElementById('mainGrid');

                    <div class="aspect-[2/3] rounded-xl overflow-hidden skeleton relative shadow-2xl"></div>
                    <div class="h-4 skeleton rounded w-3/4 mx-1"></div>
                    <div class="h-3 skeleton rounded w-1/2 mx-1 opacity-50"></div>
                </div>
            `).join('');
        }

        // Watchlist & History Functions
        function toggleWatchlist(event, itemJson) {
            event.stopPropagation();
            const item = JSON.parse(decodeURIComponent(itemJson));
            const index = watchlist.findIndex(i => i.id === item.id);
            const btn = event.currentTarget;
            
            if (index > -1) {
                watchlist.splice(index, 1);
                showToast(`Removed from My List`);
                btn.classList.replace('text-red-500', 'text-white/40');
                btn.querySelector('svg').classList.replace('fill-current', 'fill-none');
                
                if (currentMode === 'watchlist') {
                    renderResults(watchlist, false);
                }
            } else {
                watchlist.push(item);
                showToast(`Added to My List`);
                btn.classList.replace('text-white/40', 'text-red-500');
                btn.querySelector('svg').classList.replace('fill-none', 'fill-current');
            }
            localStorage.setItem('kk_watchlist', JSON.stringify(watchlist));
        }

        function addToHistory(item) {
            viewHistory = viewHistory.filter(i => i.id !== item.id); // Remove duplicates
            viewHistory.unshift(item); // Add to beginning
            if (viewHistory.length > 30) viewHistory.pop(); // Keep max 30 items
            localStorage.setItem('kk_history', JSON.stringify(viewHistory));
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'bg-zinc-900 text-white px-4 py-2 rounded-lg shadow-xl border border-white/10 text-xs font-bold uppercase tracking-widest toast-enter';
            toast.innerText = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        window.onload = () => {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            yearSelect.innerHTML = `<option value="">Select Year</option>`;
            for(let i = currentYear; i >= 1950; i--) {
                yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
            }
            fetchDiscovery('trending', document.getElementById('nav-trending'));
        };

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 400) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !document.getElementById('playerOverlay').classList.contains('hidden')) {
                closePlayer();
            }
        });

        function handleSortChange() {
            const sort = document.getElementById('sortSelect').value;
            const yearSelect = document.getElementById('yearSelect');
            if (sort.includes('primary_release_date')) {
                yearSelect.classList.remove('hidden');
            } else {
                yearSelect.classList.add('hidden');
                yearSelect.value = "";
            }
            applyFilters();
        }

        function applyFilters() {
            if (currentMode === 'watchlist' || currentMode === 'history' || currentMode === 'similar') return;
            fetchDiscovery(currentMode);
        }

        function loadMore() {
            if (currentPage < totalPages) {
                currentPage++;
                fetchDiscovery(currentMode, null, true);
            }
        }

        function surpriseMe() {
            const cards = document.querySelectorAll('.movie-card');
            if (cards.length > 0) {
                const randomIdx = Math.floor(Math.random() * cards.length);
                cards[randomIdx].click();
            } else {
                showToast("No items available to randomize!");
            }
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = "";
            document.getElementById('clearSearchBtn').classList.add('hidden');
            fetchDiscovery('trending', document.getElementById('nav-trending'));
        }

        async function fetchDiscovery(mode, element = null, isAppending = false) {
            currentMode = mode;
            const grid = document.getElementById('mainGrid');
            const title = document.getElementById('viewTitle');
            const loadMoreBtn = document.getElementById('loadMoreContainer');
            
            if (element) updateNav(element);

            if (!isAppending) {
                currentPage = 1;
                renderSkeletons();
                loadMoreBtn.classList.add('hidden');
            }

            // Local Data Modes (Watchlist / History)
            if (mode === 'watchlist' || mode === 'history') {
                document.getElementById('sortSelect').classList.add('hidden');
                document.getElementById('yearSelect').classList.add('hidden');
                title.textContent = mode === 'watchlist' ? 'My List' : 'Continue Watching';
                renderResults(mode === 'watchlist' ? watchlist : viewHistory, false);
                return;
            } else {
                document.getElementById('sortSelect').classList.remove('hidden');
                if(document.getElementById('sortSelect').value.includes('date')) {
                    document.getElementById('yearSelect').classList.remove('hidden');
                }
            }

            const sort = document.getElementById('sortSelect').value;
            const year = document.getElementById('yearSelect').value;
            const isTv = (mode === 'tv' || mode === 'anime');
            let sortParam = sort;
            if (sort === 'primary_release_date.desc') sortParam = isTv ? 'first_air_date.desc' : 'primary_release_date.desc';
            const yearParam = isTv ? 'first_air_date_year' : 'primary_release_year';

            let baseUrlEndpoint = isTv ? '/discover/tv' : '/discover/movie';
            let url = '';

            const titles = {
                'trending': 'Trending', 'movie': 'Movies', 'tv': 'TV Shows',
                'anime': 'Anime', 'action': 'Action', 'comedy': 'Comedy',
                'scifi': 'Sci-Fi', 'horror': 'Horror', 'romance': 'Romance'
            };
            title.textContent = titles[mode] || 'Results';

            if (mode === 'trending' && sort === 'popularity.desc' && !year) {
                url = `${BASE_URL}/trending/all/week?api_key=${API_KEY}&page=${currentPage}`;
            } else {
                url = `${BASE_URL}${baseUrlEndpoint}?api_key=${API_KEY}&include_adult=false&sort_by=${sortParam}&page=${currentPage}`;
                if (year) url += `&${yearParam}=${year}`;
                if (mode === 'anime') url += '&with_genres=16&with_original_language=ja';
                if (mode === 'action') url += '&with_genres=28';
                if (mode === 'comedy') url += '&with_genres=35';
                if (mode === 'scifi') url += '&with_genres=878';
                if (mode === 'horror') url += '&with_genres=27';
                if (mode === 'romance') url += '&with_genres=10749';
            }

            try {
                const res = await fetch(url);
                const data = await res.json();
                totalPages = data.total_pages || 1;
                if (data.results && data.results.length > 0) {
                    renderResults(data.results, isAppending);
                    if (currentPage < totalPages) loadMoreBtn.classList.remove('hidden');
                    else loadMoreBtn.classList.add('hidden');
                } else {
                    if(!isAppending) fallbackDiscovery(mode);
                }
            } catch (e) {
                if(!isAppending) fallbackDiscovery(mode);
            }
        }

        async function fetchSimilar() {
            if (!currentItem) return;
            const targetId = currentItem.id;
            const targetType = currentItem.type;
            const targetTitle = currentItem.title;
            
            closePlayer();
            currentMode = 'similar';
            document.getElementById('sortSelect').classList.add('hidden');
            document.getElementById('yearSelect').classList.add('hidden');
            document.getElementById('viewTitle').textContent = `Similar to ${targetTitle}`;
            document.getElementById('loadMoreContainer').classList.add('hidden');
            renderSkeletons();
            
            try {
                const res = await fetch(`${BASE_URL}/${targetType}/${targetId}/similar?api_key=${API_KEY}&page=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    renderResults(data.results, false);
                } else {
                    showToast("No similar items found.");
                    fetchDiscovery('trending'); // fallback
                }
            } catch(e) {
                showToast("Failed to fetch similar items.");
                fetchDiscovery('trending');
            }
        }

        async function handleSearch(query) {
            const clearBtn = document.getElementById('clearSearchBtn');
            const loadMoreBtn = document.getElementById('loadMoreContainer');
            
            if (query.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                fetchDiscovery('trending', document.getElementById('nav-trending'));
                return;
            }
            
            if (query.length < 2) return;

            const loader = document.getElementById('searchLoader');
            loader.classList.remove('hidden');
            loadMoreBtn.classList.add('hidden'); 

            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                renderSkeletons();
                try {
                    const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`);
                    const data = await res.json();
                    document.getElementById('viewTitle').textContent = `Search: ${query}`;
                    if (data.results && data.results.length > 0) {
                        renderResults(data.results, false);
                    } else {
                        fallbackSearch(query);
                    }
                } catch (e) {
                    fallbackSearch(query);
                }
                loader.classList.add('hidden');
            }, 500);
        }

        function fallbackDiscovery(mode) {
            console.log("Using Offline Fallback Engine");
            let data = FALLBACK_DATA;
            if (mode === 'movie' || mode === 'action' || mode === 'comedy' || mode === 'scifi') {
                data = FALLBACK_DATA.filter(i => i.media_type === 'movie');
            } else if (mode === 'anime') {
                const animeIds = [1071230, 94605, 129, 37854];
                data = FALLBACK_DATA.filter(i => animeIds.includes(i.id));
            } else if (mode === 'tv') {
                data = FALLBACK_DATA.filter(i => i.media_type === 'tv');
            }
            renderResults(data, false);
        }

        function fallbackSearch(query) {
            const lowerQuery = query.toLowerCase();
            const matches = FALLBACK_DATA.filter(item => {
                const title = (item.title || item.name || "").toLowerCase();
                return title.includes(lowerQuery);
            });
            if (matches.length > 0) {
                document.getElementById('viewTitle').textContent = `Search Results: ${query}`;
                renderResults(matches, false);
            } else {
                document.getElementById('viewTitle').textContent = `No exact match. Showing Recommendations:`;
                renderResults(FALLBACK_DATA, false);
            }
        }

                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750/111/444?text=No+Cover';
                const isWatchlisted = watchlist.some(w => w.id === item.id);
                
                const safeItemJson = encodeURIComponent(JSON.stringify({
                    id: item.id, type, title, poster_path: item.poster_path,

                        <div class="aspect-[2/3] rounded-xl overflow-hidden bg-zinc-900 relative shadow-2xl">

                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

                                <svg class="w-4 h-4 ${isWatchlisted ? 'fill-current' : 'fill-none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>

        async function playItem(item) {
            currentItem = item;
            currentSeason = 1;
            currentEpisode = 1;
            currentSeasonData = [];
            
            // Add to history
            addToHistory(item);

            const overlay = document.getElementById('playerOverlay');
            const frame = document.getElementById('videoFrame');
            const sidebar = document.getElementById('episodeSidebar');
            const epNav = document.getElementById('epNav');
            
            // Reset info bar
            document.getElementById('infoTitle').textContent = item.title;
            document.getElementById('infoDesc').textContent = 'Loading details...';
            document.getElementById('infoRating').textContent = '';
            document.getElementById('infoRuntime').textContent = '';
            document.getElementById('infoCast').classList.add('hidden');
            
            const trailerBtn = document.getElementById('trailerBtn');
            trailerBtn.classList.add('hidden');
            trailerBtn.onclick = null;

            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (item.type === 'tv') {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
                epNav.classList.remove('hidden');
                epNav.classList.add('md:flex');
                fetchSeasons(item.id);
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
                epNav.classList.add('hidden');
                epNav.classList.remove('md:flex');
            }

            fetchItemDetails(item.id, item.type);
            frame.src = SERVERS[0].url(item.id, item.type, currentSeason, currentEpisode);
            renderServerButtons();

            document.getElementById('playerLoader').classList.remove('hidden');
            frame.onload = () => document.getElementById('playerLoader').classList.add('hidden');
        }

        function renderServerButtons() {
            const serverListDesktop = document.getElementById('serverList');
            const serverListMobile = document.getElementById('mobileServerList');
            const btnsHtml = SERVERS.map((s, idx) => `
                <button onclick="switchServer(${idx})" class="srv-btn px-4 py-1.5 shrink-0 bg-white/5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-white/20 transition-all ${idx === 0 ? 'bg-red-600 text-white active-srv' : ''}">
                    ${s.name}
                </button>
            `).join('');
            serverListDesktop.innerHTML = btnsHtml;
            serverListMobile.innerHTML = btnsHtml;
        }

        async function fetchItemDetails(id, type) {
            try {
                const res = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&append_to_response=videos,credits`);
                const data = await res.json();
                
                document.getElementById('infoTitle').textContent = data.title || data.name || currentItem.title;
                document.getElementById('infoDesc').textContent = data.overview || "No synopsis available.";
                
                if (data.vote_average) {
                    document.getElementById('infoRating').textContent = `★ ${data.vote_average.toFixed(1)}`;
                }
                
                let runtimeStr = "";
                if (type === 'movie' && data.runtime) {
                    const h = Math.floor(data.runtime / 60);
                    const m = data.runtime % 60;
                    runtimeStr = `${h}h ${m}m`;
                } else if (type === 'tv' && data.episode_run_time && data.episode_run_time.length > 0) {
                    runtimeStr = `${data.episode_run_time[0]}m / EP`;
                }
                document.getElementById('infoRuntime').textContent = runtimeStr;

                // Handle Cast
                if (data.credits && data.credits.cast && data.credits.cast.length > 0) {
                    const topCast = data.credits.cast.slice(0, 3).map(c => c.name).join(', ');
                    const castEl = document.getElementById('infoCast');
                    castEl.textContent = `Starring: ${topCast}`;
                    castEl.classList.remove('hidden');
                }

                // Handle Trailer
                if (data.videos && data.videos.results) {
                    const trailer = data.videos.results.find(v => v.site === 'YouTube' && v.type === 'Trailer');
                    if (trailer) {
                        const trailerBtn = document.getElementById('trailerBtn');
                        trailerBtn.classList.remove('hidden');
                        trailerBtn.onclick = () => {
                            const frame = document.getElementById('videoFrame');
                            document.getElementById('playerLoader').classList.remove('hidden');
                            frame.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                            document.querySelectorAll('.srv-btn').forEach(b => {
                                b.classList.remove('bg-red-600', 'text-white');
                                b.classList.add('bg-white/5');
                            });
                        };
                    }
                }
            } catch (e) {
                console.log("Error fetching details", e);
                document.getElementById('infoDesc').textContent = "";
            }
        }

        async function fetchSeasons(id) {
            document.getElementById('episodeList').innerHTML = '<div class="text-center p-4 text-xs text-gray-500"><div class="w-6 h-6 border-2 border-red-600 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>Loading episodes...</div>';
            try {
                const res = await fetch(`${BASE_URL}/tv/${id}?api_key=${API_KEY}`);
                const data = await res.json();
                if (data.seasons) {
                    const valid = data.seasons.filter(s => s.season_number > 0);
                    document.getElementById('seasonSelect').innerHTML = valid.map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
                    if(valid.length > 0) {
                        loadSeason(valid[0].season_number);
                    }
                }
            } catch (e) {
                document.getElementById('episodeList').innerHTML = '<div class="text-center p-4 text-xs text-red-500">Error loading episodes</div>';
            }
        }

        async function loadSeason(season) {
            currentSeason = parseInt(season);
            const list = document.getElementById('episodeList');
            list.innerHTML = '<div class="text-center p-4 text-xs text-gray-500"><div class="w-6 h-6 border-2 border-red-600 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>Loading season...</div>';
            try {
                const res = await fetch(`${BASE_URL}/tv/${currentItem.id}/season/${season}?api_key=${API_KEY}`);
                const data = await res.json();
                if (data.episodes) {
                    currentSeasonData = data.episodes; // store for quick nav
                    list.innerHTML = data.episodes.map(ep => `
                        <div onclick="playEpisode(${ep.episode_number})" class="p-2 bg-white/5 hover:bg-white/10 cursor-pointer rounded-lg flex gap-3 group transition-all border border-transparent hover:border-white/10 hover:-translate-y-0.5">
                            <div class="w-24 h-14 flex-none bg-black rounded overflow-hidden relative shadow-lg">
                                <img src="${ep.still_path ? 'https://image.tmdb.org/t/p/w200'+ep.still_path : 'https://via.placeholder.com/200x112/111/444?text=No+Img'}" loading="lazy" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <svg class="w-5 h-5 text-red-500 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                            </div>
                            <div class="flex-grow min-w-0 flex flex-col justify-center">
                                <p class="text-[11px] font-bold text-white truncate">E${ep.episode_number}: ${ep.name}</p>
                                <p class="text-[9px] text-gray-500 mt-0.5 flex items-center gap-2">
                                    <span>${ep.runtime ? ep.runtime + 'm' : ''}</span>
                                    ${ep.vote_average ? `<span class="flex items-center text-yellow-500 gap-0.5"><svg class="w-2.5 h-2.5 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>${ep.vote_average.toFixed(1)}</span>` : ''}
                                </p>
                            </div>
                        </div>
                    `).join('');
                    
                    // Call play if it's the first load
                    if(currentEpisode === 1 && data.episodes.length > 0) {
                        playEpisode(1, false); // false = don't reload frame if it's just initializing
                    }
                }
            } catch(e) {
                list.innerHTML = '<div class="text-center p-4 text-xs text-red-500">Error loading episodes</div>';
            }
        }

        function playEpisode(epNum, reloadFrame = true) {
            currentEpisode = epNum;
            document.getElementById('currentEpLabel').textContent = `S${currentSeason} E${currentEpisode}`;
            
            if (reloadFrame) {
                let activeBtn = document.querySelector('.srv-btn.active-srv');
                let idx = activeBtn ? Array.from(document.querySelectorAll('.srv-btn')).indexOf(activeBtn) : 0;
                idx = idx % SERVERS.length; 
                
                const frame = document.getElementById('videoFrame');
                document.getElementById('playerLoader').classList.remove('hidden');
                frame.src = SERVERS[idx].url(currentItem.id, currentItem.type, currentSeason, currentEpisode);
            }
        }

        function navigateEpisode(direction) {
            const nextEp = currentEpisode + direction;
            const episodeExists = currentSeasonData.find(e => e.episode_number === nextEp);
            
            if (episodeExists) {
                playEpisode(nextEp);
            } else {
                showToast(direction > 0 ? "End of current season." : "Beginning of season.");
            }
        }

        function switchServer(idx) {
            const frame = document.getElementById('videoFrame');
            document.getElementById('playerLoader').classList.remove('hidden');
            frame.src = SERVERS[idx].url(currentItem.id, currentItem.type, currentSeason, currentEpisode);

            document.querySelectorAll('.srv-btn').forEach((btn, i) => {
                if(i % SERVERS.length === idx) {
                    btn.classList.add('bg-red-600', 'text-white', 'active-srv');
                    btn.classList.remove('bg-white/5');
                } else {
                    btn.classList.remove('bg-red-600', 'text-white', 'active-srv');
                    btn.classList.add('bg-white/5');
                }
            });
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.add('hidden');
            document.getElementById('videoFrame').src = "";
            document.body.style.overflow = 'auto';
            if (currentMode === 'history') {
                fetchDiscovery('history'); // refresh history to show newly opened items
            }
        }

        function updateNav(element) {
            if(!element) return;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.classList.add('text-gray-500');
                const svg = btn.querySelector('svg');
                if((btn.id === 'nav-watchlist' || btn.id === 'nav-history') && svg) {
                    svg.classList.remove('text-white');
                }
            });
            element.classList.add('bg-red-600', 'text-white');
            element.classList.remove('text-gray-500');
            
            if(element.id === 'nav-watchlist' || element.id === 'nav-history') {
                 element.querySelector('svg').classList.add('text-white');
                 element.querySelector('svg').classList.remove('group-hover:text-red-500');
            } else {
                 const wlSvg = document.getElementById('nav-watchlist')?.querySelector('svg');
                 if(wlSvg) wlSvg.classList.add('group-hover:text-red-500');
            }
        }
    </script>
</body>
</html>
